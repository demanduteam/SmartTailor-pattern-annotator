<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ابزار نشانه‌گذاری سایزها - نسخه حرفه‌ای</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
  <style>
    body { 
      font-family: 'Vazirmatn', sans-serif; 
      background-color: #f8fafc; 
      margin: 0; 
      overflow: hidden; 
      user-select: none;
      -webkit-user-select: none;
    }
    
    #workspace { 
      touch-action: none; 
    }
    
    #canvas-wrapper {
      background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                        linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                        linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: white;
      will-change: transform;
    }

    canvas { display: block; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    input:checked ~ .toggle-dot { transform: translateX(12px); }
    input:checked ~ .toggle-bg { background-color: #3b82f6; }
    
    @keyframes slideDown { 
      from { transform: translateY(-150%); opacity: 0; } 
      to { transform: translateY(0); opacity: 1; } 
    }
    .toast-anim { animation: slideDown 0.3s ease-out forwards; }
  </style>
</head>
<body class="flex flex-col md:flex-row h-[100dvh] text-slate-800">

  <!-- دکمه شناور موبایل -->
  <button id="btn-mobile-menu" class="md:hidden fixed bottom-6 inset-x-0 mx-auto w-max bg-blue-600 hover:bg-blue-700 text-white px-6 py-3.5 rounded-full shadow-[0_10px_25px_rgba(37,99,235,0.4)] z-40 font-bold flex items-center justify-center gap-2 transition-transform hidden">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    مدیریت سایزها
  </button>

  <!-- پیام راهنمای شناور (کاملا سازگار با RTL بدون انحراف) -->
  <div id="instruction-toast" class="fixed top-6 inset-x-0 mx-auto bg-slate-900/95 backdrop-blur text-white px-6 py-3.5 rounded-full shadow-2xl z-50 font-bold text-sm hidden flex items-center justify-center gap-3 border border-slate-700 w-[90%] max-w-sm transition-all duration-300 transform -translate-y-full">
    <span class="relative flex h-3 w-3 flex-shrink-0">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
      <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
    </span>
    <span id="instruction-text" class="leading-relaxed text-center"></span>
  </div>

  <!-- ذره‌بین لمسی و دسکتاپ با تکنولوژی رندر دورشته‌ای رزولوشن بالا -->
  <div id="magnifier-container" class="fixed hidden z-[100] pointer-events-none rounded-full border-[4px] border-white shadow-[0_15px_35px_rgba(0,0,0,0.3)] overflow-hidden bg-white" style="width: 140px; height: 140px; transform: translate(-50%, -50%);">
    <canvas id="magnifier-canvas" width="280" height="280" style="width: 140px; height: 140px;" class="absolute inset-0"></canvas>
  </div>

  <input type="file" id="image-upload" accept="image/*" class="hidden">

  <!-- سایدبار مدیریت ابعاد -->
  <aside id="sidebar" class="fixed inset-x-0 bottom-0 z-50 h-[75vh] bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-t-3xl transition-transform duration-300 transform translate-y-full md:translate-y-0 md:relative md:h-full md:w-96 md:rounded-none md:shadow-xl flex flex-col hidden">
    
    <div class="md:hidden flex justify-between items-center p-4 border-b border-slate-100">
      <div class="font-bold text-slate-800">ابزارها</div>
      <button id="btn-close-sidebar" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <div class="hidden md:block p-5 border-b border-slate-100 bg-slate-50">
      <h1 class="text-xl font-bold text-slate-900">نشانه‌گذاری سایزها</h1>
      <p class="text-xs text-slate-500 mt-1">تعریف ابعاد دقیق روی تصویر</p>
    </div>

    <div class="flex-1 overflow-y-auto p-5 flex flex-col gap-6">
      <div id="sizing-tools">
        <label class="block text-sm font-bold text-slate-700 mb-2">تعریف سایز جدید</label>
        <div class="flex gap-2">
          <input type="text" id="size-name" placeholder="مثلاً: دور سینه" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
          <button id="btn-add-size" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-bold text-sm transition-colors shadow-md shadow-blue-600/20 whitespace-nowrap">
            ثبت
          </button>
        </div>
      </div>

      <div class="flex-1 flex flex-col">
        <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
          <label class="block text-sm font-bold text-slate-700">سایزهای ثبت شده</label>
          <label class="flex items-center cursor-pointer gap-2">
            <span class="text-xs text-slate-500 font-medium hidden sm:block">نمایش</span>
            <div class="relative">
              <input type="checkbox" id="toggle-visibility" class="sr-only" checked>
              <div class="block bg-slate-200 w-8 h-5 rounded-full transition-colors toggle-bg"></div>
              <div class="dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition-transform toggle-dot shadow-sm"></div>
            </div>
          </label>
        </div>
        
        <ul id="sizes-list" class="space-y-2 pb-6">
          <li class="text-sm text-slate-400 text-center py-6 bg-slate-50 rounded-xl border border-slate-100 border-dashed">
            هنوز سایزی ثبت نشده است.
          </li>
        </ul>
      </div>
    </div>

    <div class="p-4 md:p-5 border-t border-slate-200 bg-white">
      <button id="btn-save-final" disabled class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        ثبت نهایی و دانلود
      </button>
    </div>
  </aside>

  <!-- محیط کار اصلی تعاملی -->
  <main class="flex-1 relative flex flex-col bg-slate-100 overflow-hidden">
    
    <!-- تولبار زوم هوشمند -->
    <div id="zoom-toolbar" class="hidden absolute bottom-24 right-4 md:top-5 md:right-5 md:bottom-auto z-20 flex bg-white/90 backdrop-blur rounded-xl shadow-md overflow-hidden border border-slate-200">
      <button id="btn-zoom-in" class="w-10 h-10 flex items-center justify-center text-slate-600 hover:bg-slate-100 hover:text-blue-600" title="بزرگ‌نمایی">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
      </button>
      <div class="w-px bg-slate-200"></div>
      <button id="btn-zoom-reset" class="w-12 h-10 flex items-center justify-center text-xs font-bold text-slate-600 hover:bg-slate-100" title="اندازه اصلی">
        100%
      </button>
      <div class="w-px bg-slate-200"></div>
      <button id="btn-zoom-out" class="w-10 h-10 flex items-center justify-center text-slate-600 hover:bg-slate-100 hover:text-blue-600" title="کوچک‌نمایی">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
      </button>
    </div>

    <!-- کانتینر اصلی کار -->
    <div id="workspace" class="flex-1 relative overflow-hidden bg-slate-100">
      
      <!-- حالت اولیه خالی -->
      <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6">
        <div class="w-24 h-24 bg-white border border-slate-200 text-blue-500 rounded-3xl flex items-center justify-center mb-6 shadow-sm rotate-3">
          <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-2">ابزار نشانه‌گذاری ابعاد</h2>
        <p class="text-slate-500 mb-8 text-sm leading-relaxed max-w-sm">برای شروع نشانه‌گذاری، لطفاً عکسی که توسط کاربر ارسال شده است را بارگذاری کنید.</p>
        <button onclick="document.getElementById('image-upload').click()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-8 rounded-xl shadow-lg shadow-blue-600/30 transition-all flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          انتخاب عکس از گالری
        </button>
      </div>

      <!-- بوم کاری پپاده سازی شده با CSS Scale پویا -->
      <div id="canvas-wrapper" class="hidden absolute top-0 left-0 origin-top-left rounded-xl shadow-[0_5px_25px_rgba(0,0,0,0.1)] overflow-hidden cursor-crosshair">
        <canvas id="main-canvas"></canvas>
      </div>

    </div>
  </main>

  <script>
    const PALETTE = ['#ec4899', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#06b6d4', '#f97316'];
    
    // المان‌های حیاتی DOM
    const workspace = document.getElementById('workspace');
    const wrapper = document.getElementById('canvas-wrapper');
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    
    const magContainer = document.getElementById('magnifier-container');
    const magCanvas = document.getElementById('magnifier-canvas');
    const magCtx = magCanvas.getContext('2d');
    
    // وضعیت عمومی برنامه
    let baseImage = null;
    let measurements = [];
    let showMarkers = true;
    
    // مقادیر هندسی برای موتور اسکرول و زوم (Pan & Zoom)
    let tX = 0, tY = 0, tScale = 1;
    const pointers = new Map();
    let lastPinchDist = null;
    let lastPinchCenter = null;
    let isPanning = false;

    // متغیرهای روند نشانه‌گذاری
    let drawState = 0; // 0: Idle, 1: Point1, 2: Point2
    let currentName = "";
    let currentColor = "";
    let tempStartPoint = null;
    let currentMousePos = null;

    const imgUpload = document.getElementById('image-upload');
    const sizeNameInput = document.getElementById('size-name');
    const btnAddSize = document.getElementById('btn-add-size');
    const sizesList = document.getElementById('sizes-list');
    const btnSaveFinal = document.getElementById('btn-save-final');
    const toast = document.getElementById('instruction-toast');
    const toastText = document.getElementById('instruction-text');
    const sidebar = document.getElementById('sidebar');

    // مدیریت سایدبار روی موبایل
    function toggleSidebar(forceClose = false) {
      if (window.innerWidth >= 768) return; 
      if (forceClose || !sidebar.classList.contains('translate-y-full')) {
        sidebar.classList.add('translate-y-full');
      } else {
        sidebar.classList.remove('translate-y-full');
      }
    }
    document.getElementById('btn-mobile-menu').addEventListener('click', () => toggleSidebar());
    document.getElementById('btn-close-sidebar').addEventListener('click', () => toggleSidebar(true));

    // مدیریت بهینه پیام راهنما
    function showToast(msg) {
      toastText.innerText = msg;
      toast.classList.remove('hidden', '-translate-y-full');
      toast.classList.add('toast-anim');
    }
    function hideToast() {
      toast.classList.remove('toast-anim');
      toast.classList.add('-translate-y-full');
      setTimeout(() => toast.classList.add('hidden'), 300);
    }

    // لود عکس آپلود شده
    imgUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        baseImage = new Image();
        baseImage.onload = () => {
          document.getElementById('empty-state').classList.add('hidden');
          wrapper.classList.remove('hidden');
          document.getElementById('zoom-toolbar').classList.remove('hidden');
          sidebar.classList.remove('hidden');
          document.getElementById('btn-mobile-menu').classList.remove('hidden');
          btnSaveFinal.disabled = false;

          canvas.width = baseImage.width;
          canvas.height = baseImage.height;
          
          resetZoom();
          redraw();
          
          if(window.innerWidth < 768) {
             setTimeout(() => sidebar.classList.remove('translate-y-full'), 100);
          }
        };
        baseImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // اعمال جابجایی بر اساس مقادیر هندسی
    function applyTransform() {
      wrapper.style.transform = `translate(${tX}px, ${tY}px) scale(${tScale})`;
      document.getElementById('btn-zoom-reset').innerText = Math.round(tScale * 100) + '%';
    }

    // بازنشانی مقیاس متناسب با پنجره کاری
    function resetZoom() {
      if (!baseImage) return;
      const rect = workspace.getBoundingClientRect();
      const padding = window.innerWidth < 768 ? 20 : 60;
      
      const fitScale = Math.min(
        (rect.width - padding * 2) / baseImage.width,
        (rect.height - padding * 2) / baseImage.height
      );
      
      tScale = fitScale > 1 ? 1 : fitScale;
      tX = (rect.width - baseImage.width * tScale) / 2;
      tY = (rect.height - baseImage.height * tScale) / 2;
      
      applyTransform();
    }

    // دکمه‌های کنترلی تولبار زوم
    document.getElementById('btn-zoom-in').addEventListener('click', () => zoomBy(0.2));
    document.getElementById('btn-zoom-out').addEventListener('click', () => zoomBy(-0.2));
    document.getElementById('btn-zoom-reset').addEventListener('click', resetZoom);

    function zoomBy(delta) {
      const rect = workspace.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      
      let newScale = Math.min(Math.max(tScale + delta, 0.1), 10);
      
      tX = cx - (cx - tX) * (newScale / tScale);
      tY = cy - (cy - tY) * (newScale / tScale);
      tScale = newScale;
      applyTransform();
    }

    // تبدیل مختصات نمایشگر به مختصات دقیق پیکسلی عکس
    function getImgCoord(clientX, clientY) {
      const rect = workspace.getBoundingClientRect();
      return {
        x: (clientX - rect.left - tX) / tScale,
        y: (clientY - rect.top - tY) / tScale
      };
    }

    // مدیریت و رندر دقیق ذره‌بین در زمان نشانه‌گذاری
    function updateMagnifier(clientX, clientY) {
      const magDisplaySize = 140; // اندازه ظاهری ذره‌بین به پیکسل CSS
      const magSize = 280; // اندازه بافت رندر شده (۲ برابر برای مانیتورهای رتینا)
      const offsetTop = 90; // میزان فاصله بالای انگشت/موس
      
      // موقعیت دهی فیزیکی ظرف ذره‌بین
      let posX = clientX;
      let posY = clientY - offsetTop;
      
      // جلوگیری از خروج ذره‌بین از مرزهای صفحه نمایش
      posX = Math.max(magDisplaySize/2 + 10, Math.min(window.innerWidth - magDisplaySize/2 - 10, posX));
      posY = Math.max(magDisplaySize/2 + 10, posY);
      
      magContainer.style.left = `${posX}px`;
      magContainer.style.top = `${posY}px`;
      magContainer.classList.remove('hidden');

      const imgPos = getImgCoord(clientX, clientY);
      
      // پاک کردن محتوای قبلی ذره‌بین
      magCtx.fillStyle = '#f8fafc';
      magCtx.fillRect(0, 0, magSize, magSize);
      
      // محاسبه ناحیه برش‌خورده از Canvas بوم کار
      const magZoom = 2.5; // نرخ زوم ذره‌بین
      const srcW = magDisplaySize / magZoom;
      const srcH = magDisplaySize / magZoom;
      const srcX = imgPos.x - srcW / 2;
      const srcY = imgPos.y - srcH / 2;
      
      // ترسیم تکه‌ای از تصویر بوم کار بر روی ذره‌بین
      magCtx.drawImage(canvas, srcX, srcY, srcW, srcH, 0, 0, magSize, magSize);
      
      // رسم نشانگر ریاضی (بومی) دقیقاً در مرکز ذره‌بین - عدم نیاز به المان HTML
      const centerX = magSize / 2;
      const centerY = magSize / 2;
      
      // ۱. رسم خطوط متقاطع ظریف
      magCtx.beginPath();
      // خط افقی
      magCtx.moveTo(centerX - 30, centerY);
      magCtx.lineTo(centerX + 30, centerY);
      // خط عمودی
      magCtx.moveTo(centerX, centerY - 30);
      magCtx.lineTo(centerX, centerY + 30);
      magCtx.strokeStyle = 'rgba(239, 68, 68, 0.9)'; // رنگ قرمز نیمه‌شفاف
      magCtx.lineWidth = 3;
      magCtx.stroke();
      
      // ۲. رسم دایره نشانه‌گیری بیرونی
      magCtx.beginPath();
      magCtx.arc(centerX, centerY, 15, 0, 2 * Math.PI);
      magCtx.strokeStyle = 'rgba(239, 68, 68, 0.9)';
      magCtx.lineWidth = 3;
      magCtx.stroke();
      
      // ۳. رسم نقطه کانونی تراز کامل و توپر در مرکز دقیق ذره‌بین
      magCtx.beginPath();
      magCtx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
      magCtx.fillStyle = '#ef4444';
      magCtx.fill();
    }
    
    function hideMagnifier() {
      magContainer.classList.add('hidden');
    }

    // مدیریت هوشمند کلیک‌ها و لمس‌ها به صورت چندانگشتی
    workspace.addEventListener('pointerdown', (e) => {
      if(!baseImage) return;
      pointers.set(e.pointerId, e);
      lastPinchDist = null;

      // روند نشانه‌گذاری فعال است
      if (drawState !== 0) {
        const pos = getImgCoord(e.clientX, e.clientY);
        currentMousePos = pos;
        redraw();
        updateMagnifier(e.clientX, e.clientY);
      } else {
        // شروع اسکرول معمولی با کشیدن موس/انگشت
        if (pointers.size === 1) {
          isPanning = true;
          workspace.style.cursor = 'grabbing';
        }
      }
    });

    workspace.addEventListener('pointermove', (e) => {
      if (!baseImage) return;
      e.preventDefault(); 

      if (pointers.has(e.pointerId)) {
        const prevE = pointers.get(e.pointerId);
        pointers.set(e.pointerId, e);

        // زوم دو انگشتی (مخصوص موبایل)
        if (pointers.size === 2) {
          isPanning = false;
          hideMagnifier();
          
          const pArr = Array.from(pointers.values());
          const dist = Math.hypot(pArr[0].clientX - pArr[1].clientX, pArr[0].clientY - pArr[1].clientY);
          const cx = (pArr[0].clientX + pArr[1].clientX) / 2;
          const cy = (pArr[0].clientY + pArr[1].clientY) / 2;

          if (lastPinchDist) {
            const scaleDelta = dist / lastPinchDist;
            const newScale = Math.min(Math.max(tScale * scaleDelta, 0.1), 10);
            
            const rect = workspace.getBoundingClientRect();
            const localX = cx - rect.left;
            const localY = cy - rect.top;

            tX = localX - (localX - tX) * (newScale / tScale);
            tY = localY - (localY - tY) * (newScale / tScale);
            tScale = newScale;

            tX += (cx - lastPinchCenter.x);
            tY += (cy - lastPinchCenter.y);
            
            applyTransform();
          }
          lastPinchDist = dist;
          lastPinchCenter = {x: cx, y: cy};
        } 
        // درگ تک انگشتی / حرکت موس با کلیک
        else if (pointers.size === 1) {
          if (drawState === 0 && isPanning) {
            tX += e.clientX - prevE.clientX;
            tY += e.clientY - prevE.clientY;
            applyTransform();
          } else if (drawState !== 0) {
            // آپدیت نقطه در حال رسم روی هر دستگاهی همراه ذره‌بین
            currentMousePos = getImgCoord(e.clientX, e.clientY);
            redraw(); 
            updateMagnifier(e.clientX, e.clientY);
          }
        }
      } 
      // رندر حرکت هاور موس در دسکتاپ (دقت فوق العاده قبل از کلیک)
      else if (drawState !== 0 && e.pointerType === 'mouse') {
        currentMousePos = getImgCoord(e.clientX, e.clientY);
        redraw();
        updateMagnifier(e.clientX, e.clientY);
      }
    });

    function handlePointerUp(e) {
      if(!baseImage) return;
      const wasDrawing = (drawState !== 0 && pointers.has(e.pointerId));

      pointers.delete(e.pointerId);
      if(pointers.size < 2) {
        lastPinchDist = null;
        lastPinchCenter = null;
      }
      
      if(pointers.size === 0) {
        isPanning = false;
        workspace.style.cursor = drawState !== 0 ? 'crosshair' : 'grab';
      }
      
      // زمانی که کلیک برداشته شد یا انگشت برداشته شد نقطه ثبت می‌شود
      if (wasDrawing) {
        hideMagnifier();
        registerPoint(getImgCoord(e.clientX, e.clientY));
      }
    }

    workspace.addEventListener('pointerup', handlePointerUp);
    workspace.addEventListener('pointercancel', handlePointerUp);
    workspace.addEventListener('pointerleave', () => {
      // مخفی کردن ذره‌بین در صورت خروج از محیط کار دسکتاپ
      hideMagnifier();
    });

    // پشتیبانی از چرخ موس در دسکتاپ برای زوم
    workspace.addEventListener('wheel', (e) => {
        if (!baseImage) return;
        e.preventDefault();
        const scaleDelta = e.deltaY > 0 ? 0.9 : 1.1; 
        const newScale = Math.min(Math.max(tScale * scaleDelta, 0.1), 10);
        
        const rect = workspace.getBoundingClientRect();
        const pointerX = e.clientX - rect.left;
        const pointerY = e.clientY - rect.top;

        tX = pointerX - (pointerX - tX) * (newScale / tScale);
        tY = pointerY - (pointerY - tY) * (newScale / tScale);
        tScale = newScale;
        applyTransform();
    }, { passive: false });

    // شروع روند ثبت یک سایز جدید
    btnAddSize.addEventListener('click', () => {
      const name = sizeNameInput.value.trim();
      if (!name) return;
      
      currentName = name;
      currentColor = PALETTE[measurements.length % PALETTE.length];
      drawState = 1;
      
      sizeNameInput.disabled = true;
      btnAddSize.disabled = true;
      
      showToast(`مرحله ۱: نقطه شروع «${name}» را مشخص کنید`);
      toggleSidebar(true);
      workspace.style.cursor = 'crosshair';
    });

    // ثبت مختصات در ساختار داده
    function registerPoint(pos) {
      if (drawState === 1) {
        tempStartPoint = pos;
        drawState = 2;
        showToast(`مرحله ۲: نقطه پایان «${currentName}» را مشخص کنید`);
        currentMousePos = pos;
        redraw();
      } 
      else if (drawState === 2) {
        measurements.push({
          id: Date.now(),
          name: currentName,
          color: currentColor,
          start: tempStartPoint,
          end: pos
        });
        
        drawState = 0;
        currentName = "";
        tempStartPoint = null;
        currentMousePos = null;
        
        sizeNameInput.disabled = false;
        sizeNameInput.value = "";
        btnAddSize.disabled = false;
        hideToast();
        workspace.style.cursor = 'grab';
        
        updateSizesList();
        redraw();
        
        if(window.innerWidth < 768) {
           setTimeout(() => toggleSidebar(false), 300);
        }
      }
    }

    // بازرسم کلی بوم
    function redraw() {
      if (!baseImage) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(baseImage, 0, 0);
      if (!showMarkers) return;

      const lineWidth = Math.max(3, baseImage.width * 0.003);
      const dotRadius = Math.max(6, baseImage.width * 0.006);
      const fontSize = Math.max(16, baseImage.width * 0.015);

      // رسم سایزهای ذخیره شده
      measurements.forEach(m => {
        drawLineWithLabels(m.start, m.end, m.name, ctx, dotRadius, fontSize, m.color, lineWidth);
      });

      // خط راهنمای موقت زمان تعیین نقطه دوم
      if (drawState === 2 && tempStartPoint && currentMousePos) {
        drawLineWithLabels(tempStartPoint, currentMousePos, currentName, ctx, dotRadius, fontSize, currentColor, lineWidth, true);
      }
      // نقطه شروع موقت زمان تعیین نقطه اول
      else if (drawState === 1 && currentMousePos) {
        ctx.beginPath();
        ctx.arc(currentMousePos.x, currentMousePos.y, dotRadius * 1.5, 0, 2 * Math.PI);
        
        // افزودن '33' به انتهای کد رنگ، شفافیت آن را به ۲۰ درصد کاهش می‌دهد
        ctx.fillStyle = currentColor + '33'; 
        ctx.fill();
        
        // رسم حاشیه رنگی دایره برای مشخص بودن مرز آن
        ctx.lineWidth = 2;
        ctx.strokeStyle = currentColor;
        ctx.stroke();
      }
    }

    // رسم خط با استایل لیبل در وسط
    function drawLineWithLabels(start, end, text, context, dotRadius, fontSize, color, lineWidth, isDashed = false) {
      context.beginPath();
      context.moveTo(start.x, start.y);
      context.lineTo(end.x, end.y);
      context.strokeStyle = color;
      context.lineWidth = lineWidth;
      if (isDashed) context.setLineDash([15, 15]);
      else context.setLineDash([]);
      context.stroke();
      context.setLineDash([]);

      // نقطه شروع همیشه رسم می‌شود
      drawDot(start.x, start.y, context, dotRadius, color);

      if (isDashed) {
        // نقطه پایان در حالت کشیدن خط (شفاف و توخالی زیر انگشت/موس)
        context.beginPath();
        context.arc(end.x, end.y, dotRadius * 1.5, 0, 2 * Math.PI);
        context.fillStyle = color + '33'; // شفافیت ۲۰٪
        context.fill();
        context.lineWidth = 2;
        context.strokeStyle = color;
        context.stroke();
      } else {
        // نقطه پایان برای خطوط ثبت نهایی شده (توپر)
        drawDot(end.x, end.y, context, dotRadius, color);
      }

      const midX = (start.x + end.x) / 2;
      const midY = (start.y + end.y) / 2;
      
      context.font = `bold ${fontSize}px Tahoma, sans-serif`;
      context.textAlign = 'center';
      context.textBaseline = 'middle';
      const textMetrics = context.measureText(text);
      const paddingX = fontSize * 0.8;
      const paddingY = fontSize * 0.4;
      
      context.fillStyle = color;
      context.beginPath();
      context.roundRect(
        midX - (textMetrics.width / 2) - paddingX, 
        midY - (fontSize / 2) - paddingY, 
        textMetrics.width + (paddingX * 2), 
        fontSize + (paddingY * 2), 
        50
      );
      context.fill();
      
      context.fillStyle = '#ffffff';
      context.fillText(text, midX, midY);
    }

    // رسم نقاط دایره ای سرهای خط کشی
    function drawDot(x, y, context, radius, color) {
      context.beginPath();
      context.arc(x, y, radius, 0, 2 * Math.PI);
      context.fillStyle = color;
      context.fill();
      context.lineWidth = radius * 0.4;
      context.strokeStyle = 'white';
      context.stroke();
    }

    // مدیریت دکمه نمایش/مخفی کردن تمامی ابعاد
    document.getElementById('toggle-visibility').addEventListener('change', (e) => {
      showMarkers = e.target.checked;
      redraw();
    });

    // آپدیت کردن لیست در سایدبار راست
    function updateSizesList() {
      if (measurements.length === 0) {
        sizesList.innerHTML = `<li class="text-sm text-slate-400 text-center py-6 bg-slate-50 rounded-xl border border-slate-100 border-dashed">هنوز سایزی ثبت نشده است.</li>`;
        document.getElementById('btn-mobile-menu').innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg> مدیریت سایزها`;
        return;
      }

      sizesList.innerHTML = "";
      measurements.forEach((m, index) => {
        const li = document.createElement('li');
        li.className = "flex items-center justify-between p-3.5 bg-white border border-slate-100 rounded-xl shadow-sm";
        li.innerHTML = `
          <div class="flex items-center gap-3">
            <span style="background-color: ${m.color}20; color: ${m.color}" class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold border" style="border-color:${m.color}40">${index + 1}</span>
            <span class="font-bold text-slate-700 text-sm">${m.name}</span>
          </div>
          <button onclick="removeSize(${m.id})" class="w-8 h-8 rounded-full flex items-center justify-center text-slate-400 hover:bg-red-50 hover:text-red-500 transition-colors" title="حذف">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        `;
        sizesList.appendChild(li);
      });
      
      document.getElementById('btn-mobile-menu').innerHTML = `<span class="bg-white text-blue-600 rounded-full w-6 h-6 flex items-center justify-center text-xs">${measurements.length}</span> مدیریت سایزها`;
    }

    window.removeSize = function(id) {
      measurements = measurements.filter(m => m.id !== id);
      updateSizesList();
      redraw();
    };

    // خروجی نهایی عکس با کیفیت کامل برای دانلود
    btnSaveFinal.addEventListener('click', () => {
      if (!baseImage) return;

      const previousState = showMarkers;
      showMarkers = true;
      redraw();

      const dataURL = canvas.toDataURL('image/jpeg', 1.0);
      const link = document.createElement('a');
      link.download = `annotated_${Date.now()}.jpg`;
      link.href = dataURL;
      link.click();

      showMarkers = previousState;
      redraw();
    });
  </script>
</body>
</html>
